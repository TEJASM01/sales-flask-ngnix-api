services:
  flask-api:
    build: .
    container_name: sales-flask-api
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./guard_rails.md:/usr/share/nginx/html/guard_rails.md:ro
      - ./skills.md:/usr/share/nginx/html/skills.md:ro
      - ./available_api.md:/usr/share/nginx/html/available_api.md:ro
      - ./context.md:/usr/share/nginx/html/context.md:ro
      - ./api_documentation.md:/usr/share/nginx/html/api_documentation.md:ro
    depends_on:
      - flask-api
    restart: unless-stopped
